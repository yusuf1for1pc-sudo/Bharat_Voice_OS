name: bharat_voice_os
description: "Voice-first AI assistant for every Indian"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  http: ^1.2.2
  shared_preferences: ^2.3.3
  permission_handler: ^12.0.1
  record: ^6.0.0
  just_audio: ^0.9.40
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  web_socket_channel: ^3.0.3
  dio: ^5.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
